services:
  postgres:
    image: postgres:15
    container_name: autoai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pyrun
      POSTGRES_PASSWORD: pyrun123
      POSTGRES_DB: pyrunai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
